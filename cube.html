<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maze Game 3D Cube View</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #1a1a1a; }
    canvas { display: block; }
  </style>
</head>
<body>
  <!-- 1. Configure the modern Import Map to point to the correct build engine -->
  <script type="importmap"> { "imports": { "three": "https://jsdelivr.net" } } </script>

  <!-- Create a hidden offscreen image tag to process incoming canvas frames safely -->
  <img id="mirrorImage" style="display:none;" />

  <script type="module">
    import * as THREE from 'three';

    // 2. Create a placeholder offscreen canvas for Three.js initialization
    const dummyCanvas = document.createElement('canvas');
    dummyCanvas.width = 512;
    dummyCanvas.height = 512;
    const dummyCtx = dummyCanvas.getContext('2d');
    dummyCtx.fillStyle = '#1a1a1a';
    dummyCtx.fillRect(0, 0, 512, 512);

    // --- THREE.JS SCENE SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    
    // Position camera perfectly to view 3 faces at once (Top, Front, Right)
    camera.position.set(4, 4, 4);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- TEXTURE & MATERIAL SETUP ---
    // Initialize our texture using the stable dummy canvas
    const canvasTexture = new THREE.CanvasTexture(dummyCanvas);

    // 🎯 FIX 1: Turn off pixel blurring! 
    // This forces Three.js to use "Nearest Neighbor" scaling, keeping your canvas lines razor-sharp.
    canvasTexture.minFilter = THREE.NearestFilter;
    canvasTexture.magFilter = THREE.NearestFilter;

    // 🎯 FIX 2: Switch to MeshBasicMaterial
    // This completely ignores lights and reflections, keeping your maze black pitch black 
    // and your skin colors perfectly vibrant without being lightened or bleached.
    const materials = [
      new THREE.MeshBasicMaterial({ map: canvasTexture }), // Right side (+X) -> SHARP MAZE
      new THREE.MeshBasicMaterial({ color: 0x111111 }),    // Left side (-X) -> Dark fill
      new THREE.MeshBasicMaterial({ map: canvasTexture }), // Top side (+Y) -> SHARP MAZE
      new THREE.MeshBasicMaterial({ color: 0x111111 }),    // Bottom side (-Y) -> Dark fill
      new THREE.MeshBasicMaterial({ map: canvasTexture }), // Front side (+Z) -> SHARP MAZE
      new THREE.MeshBasicMaterial({ color: 0x111111 })     // Back side (-Z) -> Dark fill
    ];

    const geometry = new THREE.BoxGeometry(2, 2, 2);
    const cube = new THREE.Mesh(geometry, materials);
    scene.add(cube);

    // --- ANIMATION LOOP ---
    function animate() {
      requestAnimationFrame(animate);
      
      // (Optional: You can add cube.rotation.y += 0.002 here if you want it to slowly turn!)
      
      renderer.render(scene, camera);
    }
    animate();

    // 🚀 THE BRIDGE: Listen for canvas frame snapshots sent from your main index.html file
    const imgElement = document.getElementById('mirrorImage');
    
    window.addEventListener('message', (event) => {
      // Security Check: Only process messages containing image data streams
      if (event.data && event.data.type === 'MAZE_FRAME') {
        imgElement.src = event.data.base64;
        
        // Wait for the image string to render, then draw it onto the texture canvas
        imgElement.onload = () => {
          dummyCtx.drawImage(imgElement, 0, 0, 512, 512);
          canvasTexture.needsUpdate = true; // Alerts GPU to refresh the 3D surface
        };
      }
    });

    // Handle responsiveness
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
