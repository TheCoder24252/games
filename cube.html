<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maze Game 3D</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #1a1a1a; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap"> { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js" } } </script>

  <!-- Create a hidden offscreen image tag to process incoming canvas frames safely -->
  <img id="mirrorImage" style="display:none;" />

  <script type="module">
    import * as THREE from 'three';

    // 1. Create a placeholder offscreen canvas for Three.js initialization
    const dummyCanvas = document.createElement('canvas');
    dummyCanvas.width = 512;
    dummyCanvas.height = 512;
    const dummyCtx = dummyCanvas.getContext('2d');
    dummyCtx.fillStyle = '#222';
    dummyCtx.fillRect(0, 0, 512, 512);

    // --- THREE.JS SCENE SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    
    // Position camera perfectly to view 3 faces at once (Top, Front, Right)
    camera.position.set(4, 4, 4);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- TEXTURE & MATERIAL SETUP ---
    // Initialize our texture using the stable dummy canvas
    const canvasTexture = new THREE.CanvasTexture(dummyCanvas);

    // Map your custom maze texture onto the 3 visible faces (+X, +Y, +Z)
    const materials = [
      new THREE.MeshStandardMaterial({ map: canvasTexture }), // Right side (+X) -> MAZE
      new THREE.MeshStandardMaterial({ color: 0x222222 }),    // Left side (-X)
      new THREE.MeshStandardMaterial({ map: canvasTexture }), // Top side (+Y) -> MAZE
      new THREE.MeshStandardMaterial({ color: 0x111111 }),    // Bottom side (-Y)
      new THREE.MeshStandardMaterial({ map: canvasTexture }), // Front side (+Z) -> MAZE
      new THREE.MeshStandardMaterial({ color: 0x333333 })     // Back side (-Z)
    ];

    const geometry = new THREE.BoxGeometry(2, 2, 2);
    const cube = new THREE.Mesh(geometry, materials);
    scene.add(cube);

    // --- LIGHTING ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 8, 5);
    scene.add(directionalLight);

    // --- ANIMATION LOOP ---
    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();

    // 🚀 THE BRIDGE: Listen for canvas frame snapshots sent from your main index.html file
    const imgElement = document.getElementById('mirrorImage');
    
    window.addEventListener('message', (event) => {
      // Security Check: Only process messages containing image data streams
      if (event.data && event.data.type === 'MAZE_FRAME') {
        imgElement.src = event.data.base64;
        
        // Wait for the image string to render, then draw it onto the texture canvas
        imgElement.onload = () => {
          dummyCtx.drawImage(imgElement, 0, 0, 512, 512);
          canvasTexture.needsUpdate = true; // Alerts GPU to refresh the 3D surface
        };
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
