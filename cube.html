<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maze Game 3D</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #1a1a1a; }
    canvas { display: block; }
    /* Hidden source 2D canvas used for the texture */
    #textureCanvas { display: none; }
  </style>
</head>
<body>
  <!-- 1. Import Map configuration for Three.js via jsDelivr CDN -->
  <script type="importmap"> { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/" } } </script>

  <script type="module">
    import * as THREE from 'three';

    // --- SETUP 2D CANVAS TEXTURE ---
    const textCanvas = window.parent.document.getElementById('mazeCanvas');

    // --- THREE.JS SCENE SETUP ---
    const scene = new THREE.Scene();

    // Camera setup for static view
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    
    // Position camera diagonally (X=Y=Z) to view exactly 3 faces at once
    camera.position.set(5, 5, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- TEXTURE & MATERIAL SETUP ---
    // Convert your DOM canvas element into a dynamic Three.js texture
    const canvasTexture = new THREE.CanvasTexture(textCanvas);

    // Create an array of 6 materials (one for each face of the box geometry)
    // Order: [pos-x, neg-x, pos-y, neg-y, pos-z, neg-z]
    const materials = [
      new THREE.MeshStandardMaterial({ color: 0x22a6b3 }), // Right side (+X)
      new THREE.MeshStandardMaterial({ color: 0xbe2edd }), // Left side (-X)
      new THREE.MeshStandardMaterial({ color: 0x4834d4 }), // Top side (+Y)
      new THREE.MeshStandardMaterial({ color: 0x130cb7 }), // Bottom side (-Y)
      new THREE.MeshStandardMaterial({ map: canvasTexture }),// Front side (+Z) -> YOUR CANVAS
      new THREE.MeshStandardMaterial({ color: 0x6ab04c })  // Back side (-Z)
    ];

    // --- MESH GENERATION ---
    const geometry = new THREE.BoxGeometry(2, 2, 2);
    const cube = new THREE.Mesh(geometry, materials);
    scene.add(cube);

    // --- LIGHTING ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
    directionalLight.position.set(5, 10, 7);
    scene.add(directionalLight);

    // --- ANIMATION LOOP ---
    function animate() {
      requestAnimationFrame(animate);

      // 1. Alert Three.js that the source canvas changed so it pushes a fresh texture frame to the GPU
      canvasTexture.needsUpdate = true;

      // 2. Render the static scene
      renderer.render(scene, camera);
    }

    animate();

    // Handle responsiveness
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
