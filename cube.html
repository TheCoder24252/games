<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maze Game 3D Cube View</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #1a1a1a; user-select: none; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <!-- 1. Include OrbitControls in the Import Map -->
  <script type="importmap"> { 
    "imports": { 
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
      "three/addons/controls/OrbitControls.js": "https://cdn.jsdelivr.net/npm/threejs-orbit-controls@1.0.3/+esm"
    } 
  } </script>

  <img id="mirrorImage" style="display:none;" />

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // 🎯 SHARPNESS FIX: Scale texture canvas size up to 2048x2048 for high-density grids
    const dummyCanvas = document.createElement('canvas');
    dummyCanvas.width = 2048;
    dummyCanvas.height = 2048;
    const dummyCtx = dummyCanvas.getContext('2d');
    dummyCtx.fillStyle = '#1a1a1a';
    dummyCtx.fillRect(0, 0, 2048, 2048);

    // --- THREE.JS SCENE SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(4, 4, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    // Sharpness Boost: Match device screen scaling for clear displays
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
    document.body.appendChild(renderer.domElement);

    // 🕹️ SWIPE TO ROTATE: Initialize interactive camera controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;   // Adds weight/inertia so it glides smoothly when thrown
    controls.dampingFactor = 0.05;
    controls.enableZoom = false;     // Stops players scrolling the cube closer/further away
    controls.enablePan = false;      // Stops players accidentally dragging the cube off-screen

    // --- TEXTURE & MATERIAL SETUP ---
    const canvasTexture = new THREE.CanvasTexture(dummyCanvas);

    // Nearest Neighbor filtering keeps pixel edges razor-sharp
    canvasTexture.minFilter = THREE.NearestFilter;
    canvasTexture.magFilter = THREE.NearestFilter;
    canvasTexture.generateMipmaps = false; // Saves processing memory on large textures

    // Wrap the texture around all 6 sides of the cube box mesh
    const materials = [
      new THREE.MeshBasicMaterial({ map: canvasTexture }), // Right side (+X)
      new THREE.MeshBasicMaterial({ map: canvasTexture }), // Left side (-X)
      new THREE.MeshBasicMaterial({ map: canvasTexture }), // Top side (+Y)
      new THREE.MeshBasicMaterial({ map: canvasTexture }), // Bottom side (-Y)
      new THREE.MeshBasicMaterial({ map: canvasTexture }), // Front side (+Z)
      new THREE.MeshBasicMaterial({ map: canvasTexture })  // Back side (-Z)
    ];

    const geometry = new THREE.BoxGeometry(2, 2, 2);
    const cube = new THREE.Mesh(geometry, materials);
    scene.add(cube);

    // --- ANIMATION LOOP ---
    function animate() {
      requestAnimationFrame(animate);
      
      // Update OrbitControls calculations every single frame
      controls.update();
      
      renderer.render(scene, camera);
    }
    animate();

    // 🚀 THE BRIDGE: Handle frame packets arriving from your main index.html file
    const imgElement = document.getElementById('mirrorImage');
    
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'MAZE_FRAME') {
        imgElement.src = event.data.base64;
        
        imgElement.onload = () => {
          // Clear previous canvas data frame
          dummyCtx.clearRect(0, 0, 2048, 2048);
          // Stretch incoming 2D vector data grid smoothly over 2048 resolution
          dummyCtx.drawImage(imgElement, 0, 0, 2048, 2048);
          canvasTexture.needsUpdate = true; 
        };
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
