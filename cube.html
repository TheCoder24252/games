<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maze Game 3D Cube View</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #1a1e23; user-select: none; }
    canvas { display: block; width: 100vw; height: 100vh; cursor: grab; }
    canvas:active { cursor: grabbing; }
  </style>
</head>
<body>
  <!-- Only 1 single, stable link to the core library is needed -->
  <script type="importmap"> { 
    "imports": { 
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js"
    } 
  } </script>

  <img id="frontside" style="display:none;" />
  <img id="backside" style="display:none;" />
   <img id="rightside" style="display:none;" />
   <img id="leftside" style="display:none;" />
   <img id="topside" style="display:none;" />
   <img id="bottomside" style="display:none;" />
  
  <script type="module">
    import * as THREE from 'three';

    // --- SETUP HIGH-RES TEXTURE SURFACE ---
   const frontCanvas = document.createElement('canvas');
    frontCanvas.width = 2048;
    frontCanvas.height = 2048;
    const frontCtx = frontCanvas.getContext('2d');
    frontCtx.fillStyle = '#1a1a1a';
    frontCtx.fillRect(0, 0, 2048, 2048);

    const backCanvas = document.createElement('canvas');
    backCanvas.width = 2048;
    backCanvas.height = 2048;
    const backCtx = backCanvas.getContext('2d');
    backCtx.fillStyle = '#1a1a1a';
    backCtx.fillRect(0, 0, 2048, 2048);


const rightCanvas = document.createElement('canvas');
    rightCanvas.width = 2048;
    rightCanvas.height = 2048;
    const rightCtx = rightCanvas.getContext('2d');
    rightCtx.fillStyle = '#1a1a1a';
    rightCtx.fillRect(0, 0, 2048, 2048);


const leftCanvas = document.createElement('canvas');
    leftCanvas.width = 2048;
    leftCanvas.height = 2048;
    const leftCtx = leftCanvas.getContext('2d');
    leftCtx.fillStyle = '#1a1a1a';
    leftCtx.fillRect(0, 0, 2048, 2048);

    const topCanvas = document.createElement('canvas');
    topCanvas.width = 2048;
    topCanvas.height = 2048;
    const topCtx = topCanvas.getContext('2d');
    topCtx.fillStyle = '#1a1a1a';
    topCtx.fillRect(0, 0, 2048, 2048);
    
const bottomCanvas = document.createElement('canvas');
    bottomCanvas.width = 2048;
    bottomCanvas.height = 2048;
    const bottomCtx = bottomCanvas.getContext('2d');
    bottomCtx.fillStyle = '#1a1a1a';
    bottomCtx.fillRect(0, 0, 2048, 2048);



    // --- THREE.JS SCENE SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 5); // Position camera straight in front of the cube face

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
    document.body.appendChild(renderer.domElement);

const textureLoader = new THREE.TextureLoader();
const imgA = textureLoader.load('https://thecoder24252.github.io/games/temp/Right.jpg');
const imgB = textureLoader.load('https://thecoder24252.github.io/games/temp/Left.jpg');
const imgC = textureLoader.load('https://thecoder24252.github.io/games/temp/Top.jpg');
const imgD = textureLoader.load('https://thecoder24252.github.io/games/temp/Bottom.jpg');
const imgE = textureLoader.load('https://thecoder24252.github.io/games/temp/Front.jpg');
const imgF = textureLoader.load('https://thecoder24252.github.io/games/temp/Back.jpg');

    const front = new THREE.CanvasTexture(dummyCanvas);
    front.minFilter = THREE.NearestFilter;
    front.magFilter = THREE.NearestFilter;
    front.generateMipmaps = false; 

    const left = new THREE.CanvasTexture(dummyCanvas);
    left.minFilter = THREE.NearestFilter;
    left.magFilter = THREE.NearestFilter;
    left.generateMipmaps = false; 

    const right = new THREE.CanvasTexture(dummyCanvas);
    right.minFilter = THREE.NearestFilter;
    right.magFilter = THREE.NearestFilter;
    right.generateMipmaps = false; 

    const back = new THREE.CanvasTexture(dummyCanvas);
    back.minFilter = THREE.NearestFilter;
    back.magFilter = THREE.NearestFilter;
    back.generateMipmaps = false; 

    const top = new THREE.CanvasTexture(dummyCanvas);
    top.minFilter = THREE.NearestFilter;
    top.magFilter = THREE.NearestFilter;
    top.generateMipmaps = false; 

    const bottom = new THREE.CanvasTexture(dummyCanvas);
    bottom.minFilter = THREE.NearestFilter;
    bottom.magFilter = THREE.NearestFilter;
    bottom.generateMipmaps = false; 

    const materials = [
      new THREE.MeshBasicMaterial({ map: right }), // Right side (+X)
      new THREE.MeshBasicMaterial({ map: left }), // Left side (-X)
      new THREE.MeshBasicMaterial({ map: top }), // Top side (+Y)
      new THREE.MeshBasicMaterial({ map: bottom }), // Bottom side (-Y)
      new THREE.MeshBasicMaterial({ map: front }), // Front side (+Z)
      new THREE.MeshBasicMaterial({ map: back })  // Back side (-Z)
    ];

    const geometry = new THREE.BoxGeometry(2, 2, 2);
    const cube = new THREE.Mesh(geometry, materials);
    scene.add(cube);

    // 🕹️ CUSTOM SWIPE & ROTATION TRACKER VARIABLES
    let isDragging = false;
    let previousMousePosition = { x: 0, y: 0 };
    
    // Physics targets for inertia rotation
    let targetRotationX = 0;
    let targetRotationY = 0;

    // --- MOUSE & SWIPE LISTENERS (0% ADDFILE/CDN NEEDED) ---
    const canvasElement = renderer.domElement;

    canvasElement.addEventListener('mousedown', (e) => {
      isDragging = true;
      previousMousePosition = { x: e.clientX, y: e.clientY };
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;

      const deltaX = e.clientX - previousMousePosition.x;
      const deltaY = e.clientY - previousMousePosition.y;

      // Adjust these dividers to make swiping faster or slower!
      targetRotationY += deltaX * 0.007;
      targetRotationX += deltaY * 0.007;

      previousMousePosition = { x: e.clientX, y: e.clientY };
    });

    window.addEventListener('mouseup', () => {
      isDragging = false;
    });

    // Support for Mobile/Touch swipes
    canvasElement.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        isDragging = true;
        previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
    });

    window.addEventListener('touchmove', (e) => {
      if (!isDragging || e.touches.length !== 1) return;
      const deltaX = e.touches[0].clientX - previousMousePosition.x;
      const deltaY = e.touches[0].clientY - previousMousePosition.y;

      targetRotationY += deltaX * 0.01;
      targetRotationX += deltaY * 0.01;

      previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    });

    window.addEventListener('touchend', () => {
      isDragging = false;
    });

    // --- ANIMATION LOOP ---
    function animate() {
      requestAnimationFrame(animate);
      
      // Apply a smooth easing/damping physics transition manually
      cube.rotation.y += (targetRotationY - cube.rotation.y) * 0.1;
      cube.rotation.x += (targetRotationX - cube.rotation.x) * 0.1;
      
      renderer.render(scene, camera);
    }
    animate();

    // --- THE BRIDGE INTERFACE LOOP ---
    const frontside = document.getElementById('frontside');
    
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'SIDEFRONT') {
        frontside.src = event.data.base64;
        
        frontside.onload = () => {
          frontCtx.clearRect(0, 0, 2048, 2048);
          frontCtx.drawImage(frontside, 0, 0, 2048, 2048);
          front.needsUpdate = true; 
        };
      }
    });

    const backside = document.getElementById('backside');
    
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'SIDEBACK') {
        backside.src = event.data.base64;
        
        backside.onload = () => {
          backCtx.clearRect(0, 0, 2048, 2048);
          backCtx.drawImage(backside, 0, 0, 2048, 2048);
          back.needsUpdate = true; 
        };
      }
    });

    const rightside = document.getElementById('rightside');
    
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'SIDERIGHT') {
        rightside.src = event.data.base64;
        
        rightside.onload = () => {
          rightCtx.clearRect(0, 0, 2048, 2048);
          rightCtx.drawImage(rightside, 0, 0, 2048, 2048);
          right.needsUpdate = true; 
        };
      }
    });

    const leftside = document.getElementById('leftside');
    
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'SIDELEFT') {
        leftside.src = event.data.base64;
        
        leftside.onload = () => {
          leftCtx.clearRect(0, 0, 2048, 2048);
          leftCtx.drawImage(leftside, 0, 0, 2048, 2048);
          left.needsUpdate = true; 
        };
      }
    });

    const topside = document.getElementById('topside');
    
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'SIDETOP') {
        topside.src = event.data.base64;
        
        topside.onload = () => {
          topCtx.clearRect(0, 0, 2048, 2048);
          topCtx.drawImage(topside, 0, 0, 2048, 2048);
          top.needsUpdate = true; 
        };
      }
    });

    const bottomside = document.getElementById('bottomside');
    
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'SIDEBOTTOM') {
        bottomside.src = event.data.base64;
        
        bottomside.onload = () => {
          bottomCtx.clearRect(0, 0, 2048, 2048);
          bottomCtx.drawImage(bottomside, 0, 0, 2048, 2048);
          bottom.needsUpdate = true; 
        };
      }
    });

    
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
