<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Game</title>
    <meta name="google-site-verification" content="i8Do3et83PUuGYTzkZ40zRfqiyXmnKyFTZbORas8oiU" />
 <meta name="description" content="Play the ultimate maze game by TheCoder24252! Unlock ranks, earn achievements, and climb the leaderboards.">
 <link rel="icon" type="image/x-icon" href="./Maze-Logo.png">
    <style>
        /* Remove browser spacing and allow 100% height chain */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevents double scrollbars */
        }
        /* Make the iframe fill its parent container completely */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block; /* Removes unwanted baseline gaps */
        }
    </style>
</head>
<body>

    <iframe src="https://thecoder24252.github.io/games/"></iframe>
    <script>
        window.onload = () => {
const queryString = window.location.search;
const urlParams = new URLSearchParams(queryString);
if (urlParams.get('adminapplication') === 'true') {
		document.querySelector('iframe').src = 'https://thecoder24252.github.io/games/iframe.html?adminapplication=true';
} else if (urlParams.get('idea') === 'true') {
		document.querySelector('iframe').src = 'https://thecoder24252.github.io/games/iframe.html?idea=true'
} else if (urlParams.get('bug') === 'true') {
		document.querySelector('iframe').src = 'https://thecoder24252.github.io/games/iframe.html?bug=true'
}}
    </script>
</body>
</html>
